services:
  - type: web
    name: bangalore-lakes-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn bangalore_lakes.web.app:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: BLWQ_CORS_ORIGINS
        value: https://bangalore-lakes.vercel.app
      - key: BLWQ_OUTPUT_DIR
        value: /opt/render/project/src/outputs
      - key: BLWQ_LOG_LEVEL
        value: INFO
